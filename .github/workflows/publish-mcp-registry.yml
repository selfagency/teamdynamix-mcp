name: Publish to MCP Registry

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-mcp-registry:
    name: Publish server.json to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish --domain self.agency
        env:
          MCP_PUBLISHER_SERVER_JSON_PATH: docs/public/server.json
